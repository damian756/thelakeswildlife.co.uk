name: NPM audit

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: npm-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production dependency audit (high and critical gate)
        run: npm audit --omit=dev --audit-level=high