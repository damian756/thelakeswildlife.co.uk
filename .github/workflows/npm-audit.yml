name: NPM audit

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: npm-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Fail the job only on production critical advisories. Full report (including high) still prints in the next step.
      - name: Production dependency audit (critical gate)
        run: npm audit --omit=dev --audit-level=critical

      - name: Production audit full report (informational)
        run: npm audit --omit=dev
        continue-on-error: true
